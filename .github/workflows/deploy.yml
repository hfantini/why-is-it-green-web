name: Deploy

on:
  workflow_run:
    workflows: ['Build']
    types:
      - completed

  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (ex: v1.2.3)'
        required: true
      target:
        description: 'Minimum environment deploy'
        type: choice
        options:
          - staging
          - production
        default: staging
        required: true

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      target: ${{ steps.vars.outputs.target }}

    steps:
      - id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            TARGET="${{ github.event.inputs.target }}"
          else
            VERSION="${{ github.event.workflow_run.head_branch }}"
            TARGET="staging"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "target=$TARGET" >> $GITHUB_OUTPUT

  deploy-staging:
    runs-on: ubuntu-latest
    needs: resolve
    if: needs.resolve.outputs.target == 'staging'

    steps:
      - name: Validate image exists on Docker Hub
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_USERNAME }}/why-is-it-green-web/tags/${VERSION})

          if [ "$STATUS" -ne 200 ]; then
            echo "Image ${VERSION} does not exist on Docker Hub - Failing."
            exit 1
          fi

      - name: Deploy to Render (Staging)
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          IMAGE="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/why-is-it-green-web:${VERSION}"

          curl -X POST \
            https://api.render.com/v1/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}/deploys \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"imageUrl\": \"$IMAGE\"}"

  approval:
    runs-on: ubuntu-latest
    needs: [resolve, deploy-staging]
    if: needs.resolve.outputs.target == 'staging'

    steps:
      - name: Manual approval before production
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: hfantini
          minimum-approvals: 1
          issue-title: 'Approve deployment to production'
          issue-body: 'Please approve or deny the deployment.'

  deploy-production:
    runs-on: ubuntu-latest
    needs: [resolve, deploy-staging]
    if: always() && (
      needs.resolve.outputs.target == 'production' ||
      needs.resolve.outputs.target == 'staging'
      )

    environment: production

    steps:
      - name: Deploy to Render (Production)
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          IMAGE="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/why-is-it-green-web:${VERSION}"

          curl -X POST \
            https://api.render.com/v1/services/${{ secrets.RENDER_PRODUCTION_SERVICE_ID }}/deploys \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"imageUrl\": \"$IMAGE\"}"
